name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build (warnings as errors)
        run: dotnet build src/Matios.Security/Matios.Security.csproj -c Release

      - name: Test
        run: dotnet test tests/Matios.Security.Tests/Matios.Security.Tests.csproj -c Release

      - name: Pack
        run: dotnet pack src/Matios.Security/Matios.Security.csproj -c Release -o artifacts

      - name: Upload package artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
